# WikiOracle configuration — example template
# Copy to config.yaml and fill in your values. config.yaml is gitignored.

# --- User --------------------------------------------------------------------
# Your display name in chat messages.

user:
  name: User
  uid: ""  # Persistent user GUID (auto-generated from name if blank)

# --- LLM Providers -----------------------------------------------------------
# name     = LLM display name in chat (tags assistant messages)
# username = your API login / email for that provider
# url      = API endpoint (defaults built in)

providers:
  wikioracle:
    name: oracle
    username: you@example.com
    url: http://127.0.0.1:8000/chat/completions
    timeout: 15  # seconds – NanoChat request timeout

  openai:
    name: chatGPT
    username: you@example.com
    url: https://api.openai.com/v1/chat/completions
    api_key: ""                          # or set OPENAI_API_KEY env var
    default_model: gpt-4o

  anthropic:
    name: claude
    username: you@example.com
    url: https://api.anthropic.com/v1/messages
    api_key: ""                          # or set ANTHROPIC_API_KEY env var
    default_model: claude-sonnet-4-6

  gemini:
    name: gemini
    username: you@example.com
    url: https://generativelanguage.googleapis.com/v1beta/models
    api_key: ""                          # or set GEMINI_API_KEY env var
    default_model: gemini-2.5-flash

  grok:
    name: grok
    username: you@example.com
    url: https://api.x.ai/v1/chat/completions
    api_key: ""                          # or set XAI_API_KEY env var
    default_model: grok-3-mini

# --- Chat settings -----------------------------------------------------------

chat:
  temperature: 0.7
  rag: false                              # use truth entries for retrieval
  url_fetch: false                       # allow URL fetching in responses
  confirm_actions: true                  # prompt before deletes, merges, etc.

# --- UI defaults -------------------------------------------------------------

ui:
  default_provider: wikioracle
  layout: horizontal                      # flat | horizontal | vertical
  theme: system                           # system | light | dark
  splitter_pct: 0                         # tree panel height (0 = collapsed)
  swipe_nav_horizontal: true  # Swipe left/right to navigate siblings
  swipe_nav_vertical: false  # Swipe up/down to navigate siblings

# --- Server ------------------------------------------------------------------
# Runtime parameters — usually set via CLI flags; YAML values are defaults.

server:
  stateless: true
  url_prefix: ""
  # --- Online Training -------------------------------------------------------
  # Continuous learning from user interactions (see doc/Training.md).
  online_training:
    enabled: false                        # enable continuous truth corpus updates
    truth_corpus_path: "data/truth.jsonl" # append-only truth log
    alpha_base: 0.01                      # base learning rate
    alpha_min: 0.001                      # minimum learning rate floor
    alpha_max: 0.1                        # maximum learning rate ceiling
    merge_rate: 0.1                       # slow-moving average rate for truth merge
    device: cpu                           # training device: auto | cpu | cuda
    dissonance_enabled: true              # detect and penalize contradictions
    operators_dynamic_enabled: true       # load custom operators from operators/operators.jsonl
  # URL prefixes allowed for authority and dynamic provider fetches.
  # file:// URLs are always blocked.  Only https:// URLs matching one of
  # these prefixes are permitted.
  allowed_urls:
    - "https://api.openai.com/"
    - "https://api.anthropic.com/"
    - "https://generativelanguage.googleapis.com/"
    - "https://api.x.ai/"
    - "https://en.wikipedia.org/"
    - "https://wikiOracle.org/"
    - "https://127.0.0.1:"
    - "https://localhost:"
    - "http://127.0.0.1:"
