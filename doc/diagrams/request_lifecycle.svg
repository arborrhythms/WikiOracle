<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">WikiOracle request and truth lifecycle</title>
  <desc id="desc">Five-stage flow from client request through truth resolution, expert consultation, final synthesis, persistence, and optional learning.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#34495e"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke-width:2.5}.title{font:700 23px Arial,sans-serif;fill:#fff}.h{font:700 19px Arial,sans-serif}.t{font:15px Arial,sans-serif;fill:#243447}.s{font:13px Arial,sans-serif;fill:#526170}.arrow{stroke:#34495e;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <rect width="1200" height="56" fill="#243447"/>
  <text x="600" y="36" text-anchor="middle" class="title">Request and truth lifecycle</text>

  <rect class="box" x="55" y="100" width="330" height="160" rx="12" stroke="#2471a3"/>
  <circle cx="88" cy="132" r="20" fill="#2471a3"/><text x="88" y="139" text-anchor="middle" class="title">1</text>
  <text x="120" y="139" class="h" fill="#2471a3">Normalize request</text>
  <text x="80" y="177" class="t">Message + selected path</text>
  <text x="80" y="203" class="t">Authoritative state/config</text>
  <text x="80" y="229" class="s">Validate, sanitize, resolve provider/model</text>

  <rect class="box" x="435" y="100" width="330" height="160" rx="12" stroke="#1e8449"/>
  <circle cx="468" cy="132" r="20" fill="#1e8449"/><text x="468" y="139" text-anchor="middle" class="title">2</text>
  <text x="500" y="139" class="h" fill="#1e8449">Resolve truth</text>
  <text x="460" y="177" class="t">Facts + feelings + references</text>
  <text x="460" y="203" class="t">Logic + bounded authorities</text>
  <text x="460" y="229" class="s">Compute derived DoT; assemble sources</text>

  <rect class="box" x="815" y="100" width="330" height="160" rx="12" stroke="#ca6f1e"/>
  <circle cx="848" cy="132" r="20" fill="#ca6f1e"/><text x="848" y="139" text-anchor="middle" class="title">3</text>
  <text x="880" y="139" class="h" fill="#ca6f1e">Consult experts</text>
  <text x="840" y="177" class="t">Fan out dynamic providers</text>
  <text x="840" y="203" class="t">Collect truth/conversation output</text>
  <text x="840" y="229" class="s">Call-chain guard prevents voting cycles</text>

  <path class="arrow" d="M385 180 H425"/>
  <path class="arrow" d="M765 180 H805"/>

  <path class="arrow" d="M980 260 V320 H790"/>
  <rect class="box" x="615" y="330" width="330" height="160" rx="12" stroke="#7d3c98"/>
  <circle cx="648" cy="362" r="20" fill="#7d3c98"/><text x="648" y="369" text-anchor="middle" class="title">4</text>
  <text x="680" y="369" class="h" fill="#7d3c98">Synthesize + persist</text>
  <text x="640" y="407" class="t">Main provider creates final response</text>
  <text x="640" y="433" class="t">Extract facts/feelings; update DAG</text>
  <text x="640" y="459" class="s">Full state (stateless) or delta (stateful)</text>

  <rect class="box" x="255" y="330" width="300" height="160" rx="12" stroke="#a93226" stroke-dasharray="8 5"/>
  <circle cx="288" cy="362" r="20" fill="#a93226"/><text x="288" y="369" text-anchor="middle" class="title">5</text>
  <text x="320" y="369" class="h" fill="#a93226">Learn (optional)</text>
  <text x="280" y="407" class="t">DoT + privacy + symmetry policy</text>
  <text x="280" y="433" class="t">Merge server truth; train one step</text>
  <text x="280" y="459" class="s">Disabled in stateless/default config</text>

  <path class="arrow" d="M615 410 H565"/>

  <rect x="115" y="565" width="970" height="100" rx="12" fill="#eaf2f8" stroke="#5d6d7e" stroke-width="2"/>
  <text x="600" y="597" text-anchor="middle" class="h" fill="#34495e">Conversation topology</text>
  <text x="600" y="627" text-anchor="middle" class="t">No dynamic providers: one linear call   |   Truth-only betas: hidden evidence   |   Conversational betas: visible diamond</text>
  <text x="600" y="651" text-anchor="middle" class="s">The UI-selected provider remains the final synthesizer in all three cases.</text>
  <path class="arrow" d="M780 490 V555"/>
</svg>
