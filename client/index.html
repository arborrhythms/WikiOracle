<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WikiOracle</title>
<link rel="stylesheet" href="wikioracle.css?v=2">
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="header-btn" id="btnImport" title="Open a state file or start fresh">Open</button>
  <button class="header-btn" id="btnRead" title="Open conversations in a readable view">Read</button>
  <button class="header-btn" id="btnExport" title="Save session as llm_*.xml">Save</button>
  <button class="header-btn" id="btnSearch" title="Search conversations">Search</button>
  <button class="header-btn" id="btnSettings" title="Settings">Settings</button>
</div>

<!-- Settings overlay -->
<div class="context-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="dialog-title-bar"><h2>Settings</h2><button class="dialog-close" id="btnSettingsClose">&times;</button></div>

    <label for="setUsername">Your name</label>
    <input type="text" id="setUsername" placeholder="Alec">

    <label for="setProvider">Provider</label>
    <select id="setProvider">
      <option value="wikioracle">WikiOracle</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="gemini">Gemini</option>
      <option value="grok">Grok</option>
      <option value="openrouter">OpenRouter</option>
    </select>

    <label for="setModel">Model</label>
    <select id="setModel"></select>

    <label for="setProviderTrust">Provider trust</label>
    <div class="settings-row">
      <input type="range" id="setProviderTrust" min="0" max="1" step="0.05" value="0.6">
      <span class="range-val" id="setProviderTrustVal">0.6</span>
    </div>

    <label for="setLayout">Layout</label>
    <select id="setLayout">
      <option value="horizontal">Horizontal (tree on top)</option>
      <option value="vertical">Vertical (tree on left)</option>
    </select>

    <label for="setTheme">Theme</label>
    <select id="setTheme">
      <option value="system">System</option>
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>

    <label for="setTemp">Temperature</label>
    <div class="settings-row">
      <input type="range" id="setTemp" min="0" max="2" step="0.1" value="0.7">
      <span class="range-val" id="setTempVal">0.7</span>
    </div>

    <label class="settings-check">
      <input type="checkbox" id="setUrlFetch"> Allow URL fetching
    </label>

    <label class="settings-check">
      <input type="checkbox" id="setThoughtFree"> Thought-free mode (shamatha speech)
    </label>

    <label class="settings-check">
      <input type="checkbox" id="setConfirm"> Confirm deletes and merges
    </label>

    <div class="settings-sep">
      <button class="btn btn-full" id="btnDropboxConnect">Cloud Storage: Not configured</button>
      <button class="btn btn-full" id="btnDropboxDisconnect" style="display:none">Cloud Storage: Disconnect</button>
    </div>

    <div class="settings-actions">
      <button class="btn" id="btnSettingsCancel">Cancel</button>
      <button class="btn btn-primary" id="btnSettingsSave">Save</button>
    </div>
  </div>
</div>

<!-- Main area (tree + divider + chat) -->
<div class="main-area" id="mainArea">
  <!-- Tree view -->
  <div class="tree-container" id="treeContainer">
    <svg></svg>
  </div>

  <!-- Draggable divider -->
  <div class="resize-divider" id="resizeDivider"></div>

  <!-- Chat area -->
  <div class="chat-container" id="chatContainer">
    <div class="chat-wrapper" id="chatWrapper"></div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div id="attachmentChips" class="attachment-chips" style="display:none"></div>
  <div class="input-wrapper">
    <button class="attach-btn" id="btnAttach" title="Attach file or URL">+</button>
    <textarea id="msgInput" rows="1" placeholder="Message WikiOracle..." autofocus></textarea>
    <button class="send-btn" id="btnSend">Send</button>
  </div>
</div>
<input type="file" id="fileAttach" class="hidden">

<!-- Hidden file input for import -->
<input type="file" id="fileImport" accept=".xml,.json" class="hidden">

<script src="d3.min.js"></script>
<script src="purify.min.js"></script>
<script src="config.js?v=1"></script>
<script src="state.js?v=1"></script>
<script src="util.js?v=4"></script>
<script src="graph.js?v=1"></script>
<script src="query.js?v=1"></script>
<script src="tree.js?v=17"></script>
<script src="storage.js?v=5"></script>
<script src="wikioracle.js?v=34"></script>
</body>
</html>
