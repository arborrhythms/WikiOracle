# WikiOracle 5DG Grammar
#
# Nonterminals (phrase-level):
#   S    — Sentence
#   NP   — Noun Phrase
#   VP   — Verb Phrase
#   AP   — Adjective Phrase
#   MP   — Modal/adverb Phrase
#   PP   — Prepositional Phrase
#   DEF  — Definitive group (copula + optional negation)
#   HAS  — Possessive group (possess + optional negation)
#
# Terminals:
#   Closed-class (function words) — enumerated below with all known forms.
#     IS, POSSESS, NOT, AND, OR, P, DET, DEG
#   Open-class (content words) — added dynamically per sentence by POS tagger.
#     N, V, ADJ, ADV

# --- Sentence -----------------------------------------------------------

S -> NP
S -> NP VP
S -> MP S
S -> NP DEF NP
S -> NP DEF AP
S -> NP HAS NP
S -> NOT S
S -> S AND S
S -> S OR S
S -> DEF NP AP
S -> DEF NP NP
S -> V NP VP
S -> PP S

# --- Noun Phrase ---------------------------------------------------------

NP -> N
NP -> AP NP
NP -> NP PP
NP -> NP AND NP
NP -> NP OR NP

# --- Verb Phrase ---------------------------------------------------------

VP -> V
VP -> ADV VP
VP -> MP VP
VP -> ADJ VP
VP -> V PP
VP -> V NP
VP -> V S
VP -> V MP
VP -> VP PP
VP -> DEF VP
VP -> NOT VP

# --- Adjective Phrase ----------------------------------------------------

AP -> ADJ
AP -> DET
AP -> ADJ AP
AP -> DEG AP

# --- Modal Phrase --------------------------------------------------------

MP -> ADV
MP -> ADV MP

# --- Prepositional Phrase ------------------------------------------------

PP -> P NP

# --- Definitive Groups ---------------------------------------------------

DEF -> IS
DEF -> IS NOT
HAS -> POSSESS
HAS -> POSSESS NOT

# --- Function-Word Terminals ---------------------------------------------
# Closed-class words enumerated here.  To add a new copula form, preposition,
# etc., just append it to the appropriate rule.  The parser derives all
# word-to-terminal mappings from these rules at load time.

IS      -> "is" | "are" | "was" | "were" | "am" | "be" | "been" | "being" | "'s" | "'m" | "'re"
POSSESS -> "has" | "have" | "had" | "having" | "'ve"
NOT     -> "not" | "n't" | "non"
AND     -> "and" | "but" | "yet" | "nor" | "because" | "since" | "although" | "though" | "while" | "if" | "unless" | "until" | "when" | "where" | "after" | "before" | "so"
OR      -> "or"
P       -> "over" | "under" | "up" | "down" | "in" | "out" | "on" | "off" | "through" | "across" | "above" | "below" | "into" | "onto" | "upon" | "of" | "to" | "at" | "for" | "from" | "with" | "about" | "by"
DET     -> "the" | "a" | "an" | "every" | "some" | "any" | "no" | "my" | "your" | "his" | "her" | "its" | "our" | "their" | "that" | "this" | "these" | "those" | "all" | "both" | "each"
DEG     -> "very" | "quite" | "somewhat" | "rather" | "extremely" | "really" | "fairly" | "slightly" | "barely" | "almost" | "nearly" | "pretty" | "highly" | "particularly" | "especially" | "incredibly" | "remarkably" | "absolutely" | "completely" | "totally" | "entirely" | "mostly" | "largely" | "partly" | "partially" | "deeply" | "fully" | "truly" | "utterly" | "thoroughly" | "scarcely" | "hardly" | "merely" | "exactly"

# --- Content-Word Terminals ----------------------------------------------
# N, V, ADJ, ADV are open-class.  The parser adds rules like N -> "fox"
# dynamically per sentence based on NLTK's POS tagger.  No static rules
# are needed here.
