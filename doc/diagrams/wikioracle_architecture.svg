<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">WikiOracle architecture</title>
  <desc id="desc">Browser client, Flask orchestration layer, language model providers, XML documents, and optional encrypted Dropbox storage.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#34495e"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke-width:2}.head{font:700 23px Arial,sans-serif;fill:#fff}.sub{font:700 18px Arial,sans-serif}.body{font:15px Arial,sans-serif;fill:#243447}.small{font:13px Arial,sans-serif;fill:#526170}.mono{font:13px Menlo,Consolas,monospace;fill:#243447}.label{font:700 13px Arial,sans-serif;fill:#34495e}.arrow{stroke:#34495e;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <rect x="0" y="0" width="1200" height="56" fill="#243447"/>
  <text x="600" y="36" text-anchor="middle" class="head">WikiOracle architecture</text>

  <!-- Browser -->
  <rect class="panel" x="40" y="90" width="310" height="470" rx="12" stroke="#2471a3"/>
  <rect x="40" y="90" width="310" height="50" rx="12" fill="#2471a3"/>
  <rect x="40" y="125" width="310" height="15" fill="#2471a3"/>
  <text x="195" y="122" text-anchor="middle" class="head">Browser client</text>
  <text x="65" y="174" class="sub" fill="#2471a3">Conversation UI</text>
  <text x="65" y="202" class="body">Branching tree/DAG navigation</text>
  <text x="65" y="226" class="body">XHTML rendering and sanitization</text>
  <text x="65" y="250" class="body">Truth and config editors</text>

  <text x="65" y="292" class="sub" fill="#2471a3">Client authority</text>
  <text x="65" y="320" class="body">Selected provider and model</text>
  <text x="65" y="344" class="body">UI and evaluation preferences</text>
  <text x="65" y="368" class="body">State in stateless mode</text>

  <rect x="65" y="405" width="260" height="122" rx="8" fill="#eaf4fb" stroke="#85c1e9"/>
  <text x="195" y="432" text-anchor="middle" class="sub" fill="#2471a3">Client modules</text>
  <text x="84" y="460" class="mono">wikioracle.js  tree.js</text>
  <text x="84" y="484" class="mono">state.js       config.js</text>
  <text x="84" y="508" class="mono">query.js       storage.js</text>

  <!-- Server -->
  <rect class="panel" x="445" y="90" width="310" height="470" rx="12" stroke="#7d3c98"/>
  <rect x="445" y="90" width="310" height="50" rx="12" fill="#7d3c98"/>
  <rect x="445" y="125" width="310" height="15" fill="#7d3c98"/>
  <text x="600" y="122" text-anchor="middle" class="head">Flask orchestration</text>
  <text x="470" y="174" class="sub" fill="#7d3c98">Request pipeline</text>
  <text x="470" y="202" class="body">Validate input, state, and config</text>
  <text x="470" y="226" class="body">Derive truth and resolve authorities</text>
  <text x="470" y="250" class="body">Fan out provider votes</text>
  <text x="470" y="274" class="body">Synthesize, persist, optionally train</text>

  <text x="470" y="316" class="sub" fill="#7d3c98">Endpoint groups</text>
  <text x="470" y="344" class="mono">health / status / info</text>
  <text x="470" y="368" class="mono">state / new / chat / merge</text>
  <text x="470" y="392" class="mono">config / bootstrap</text>
  <text x="470" y="416" class="mono">auth / storage / authority</text>
  <text x="470" y="440" class="mono">UI and static assets</text>

  <rect x="470" y="468" width="260" height="60" rx="8" fill="#f4ecf7" stroke="#c39bd3"/>
  <text x="600" y="493" text-anchor="middle" class="small">Bearer auth (optional), CSRF header,</text>
  <text x="600" y="515" text-anchor="middle" class="small">rate limits, CORS, CSP, size limits</text>

  <!-- Providers -->
  <rect class="panel" x="850" y="90" width="310" height="265" rx="12" stroke="#ca6f1e"/>
  <rect x="850" y="90" width="310" height="50" rx="12" fill="#ca6f1e"/>
  <rect x="850" y="125" width="310" height="15" fill="#ca6f1e"/>
  <text x="1005" y="122" text-anchor="middle" class="head">Model providers</text>
  <text x="875" y="174" class="body">WikiOracle / NanoChat</text>
  <text x="875" y="200" class="body">WikiOracle / BasicModel</text>
  <text x="875" y="226" class="body">OpenAI, Anthropic, Gemini</text>
  <text x="875" y="252" class="body">Grok and OpenRouter</text>
  <text x="875" y="294" class="small">UI-selected provider = synthesizer</text>
  <text x="875" y="318" class="small">Truth providers = weighted experts</text>

  <!-- Learning -->
  <rect class="panel" x="850" y="385" width="310" height="175" rx="12" stroke="#1e8449"/>
  <rect x="850" y="385" width="310" height="44" rx="12" fill="#1e8449"/>
  <rect x="850" y="414" width="310" height="15" fill="#1e8449"/>
  <text x="1005" y="416" text-anchor="middle" class="head">Optional learning</text>
  <text x="875" y="463" class="body">Sensation preprocessing</text>
  <text x="875" y="489" class="body">DoT-gated online training</text>
  <text x="875" y="515" class="body">Warmup, clipping, EMA anchoring</text>
  <text x="875" y="541" class="small">Disabled by default</text>

  <!-- Arrows -->
  <path class="arrow" d="M350 250 H435"/>
  <path class="arrow" d="M445 300 H360"/>
  <text x="398" y="230" text-anchor="middle" class="label">HTTPS + JSON</text>
  <path class="arrow" d="M755 215 H840"/>
  <path class="arrow" d="M850 275 H765"/>
  <text x="802" y="194" text-anchor="middle" class="label">provider APIs</text>
  <path class="arrow" d="M755 465 H840"/>

  <!-- Durable documents -->
  <rect x="40" y="610" width="350" height="105" rx="10" fill="#e8f8f5" stroke="#148f77" stroke-width="2"/>
  <text x="215" y="641" text-anchor="middle" class="sub" fill="#148f77">state.xml</text>
  <text x="215" y="669" text-anchor="middle" class="body">header + conversations + TruthSet</text>
  <text x="215" y="694" text-anchor="middle" class="small">portable client/session document</text>

  <rect x="425" y="610" width="350" height="105" rx="10" fill="#fef9e7" stroke="#b7950b" stroke-width="2"/>
  <text x="600" y="641" text-anchor="middle" class="sub" fill="#9a7d0a">config.xml</text>
  <text x="600" y="669" text-anchor="middle" class="body">server policy + client preferences</text>
  <text x="600" y="694" text-anchor="middle" class="small">provider definitions and selection</text>

  <rect x="810" y="610" width="350" height="105" rx="10" fill="#f4ecf7" stroke="#7d3c98" stroke-width="2"/>
  <text x="985" y="641" text-anchor="middle" class="sub" fill="#7d3c98">Encrypted Dropbox (optional)</text>
  <text x="985" y="669" text-anchor="middle" class="body">AES ZIP backup for state/config</text>
  <text x="985" y="694" text-anchor="middle" class="small">state-only sharing via authority QR</text>

  <path class="arrow" d="M540 560 V600"/>
  <path class="arrow" d="M660 560 V600"/>
  <path class="arrow" d="M755 530 C815 560 885 575 940 600"/>
</svg>
